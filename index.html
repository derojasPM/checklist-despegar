<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generador de Checklists — Despegar Implementaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --borgona: #5a3143;
  --coral: #fc838a;
  --coral-light: #fde8e9;
  --dorado: #aca46b;
  --gris-claro: #f3f4f6;
  --gris-medio: #9ca3af;
  --texto: #1f2937;
  --texto-suave: #6b7280;
  --borde: #e5e7eb;
  --blanco: #ffffff;
  --verde: #065f46;
  --verde-bg: #d1fae5;
  --amarillo: #92400e;
  --amarillo-bg: #fef3c7;
  --rojo: #991b1b;
  --rojo-bg: #fee2e2;
  --info: #1e40af;
  --info-bg: #dbeafe;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #f8f7f5;
  color: var(--texto);
  min-height: 100vh;
}

header {
  background: var(--borgona);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
header .logo-dot {
  width: 10px; height: 10px;
  background: var(--coral);
  border-radius: 50%;
}
header h1 {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.01em;
}
header span {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-left: 4px;
}

.container {
  max-width: 740px;
  margin: 2.5rem auto;
  padding: 0 1.5rem 4rem;
}

.step-bar {
  display: flex;
  align-items: center;
  margin-bottom: 2.5rem;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--gris-medio);
  white-space: nowrap;
}
.step-item.active { color: var(--texto); }
.step-item.done { color: var(--verde); }
.step-dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--borde);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.step-item.active .step-dot {
  background: var(--borgona);
  border-color: var(--borgona);
  color: #fff;
}
.step-item.done .step-dot {
  background: var(--verde-bg);
  border-color: var(--verde);
  color: var(--verde);
}
.step-line { flex: 1; height: 1px; background: var(--borde); margin: 0 10px; }

.card {
  background: var(--blanco);
  border: 1px solid var(--borde);
  border-radius: 14px;
  padding: 2rem;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--gris-medio);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.proj-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 2rem;
}
.proj-card {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--borde);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--blanco);
}
.proj-card:hover { border-color: #d1d5db; background: #fafafa; }
.proj-card.selected {
  border: 1.5px solid var(--borgona);
  background: #f9f3f5;
}
.proj-card .num { font-size: 11px; color: var(--gris-medio); margin-bottom: 2px; font-family: 'DM Mono', monospace; }
.proj-card .name { font-size: 13px; font-weight: 500; color: var(--texto); }
.proj-card.selected .name { color: var(--borgona); }

.divider { height: 1px; background: var(--borde); margin: 1.75rem 0; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 13px; color: var(--texto-suave); font-weight: 500; }

input[type="text"], input[type="email"], input[type="date"], select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--borde);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--texto);
  background: var(--blanco);
  outline: none;
  transition: border-color 0.15s;
}
input:focus, select:focus { border-color: var(--borgona); }
input::placeholder { color: var(--gris-medio); }

.tag-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--borde);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  background: var(--blanco);
  color: var(--texto-suave);
  transition: all 0.15s;
  user-select: none;
}
.tag:hover { border-color: #d1d5db; color: var(--texto); }
.tag.selected {
  background: #f9f3f5;
  border-color: var(--borgona);
  color: var(--borgona);
}

.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.75rem; }
.btn-primary {
  padding: 10px 22px;
  border-radius: 8px;
  border: none;
  background: var(--borgona);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  padding: 10px 18px;
  border-radius: 8px;
  border: 1px solid var(--borde);
  background: var(--blanco);
  color: var(--texto-suave);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
}
.btn-secondary:hover { background: var(--gris-claro); }

.error-msg { font-size: 12px; color: var(--rojo); margin-top: 8px; }

.loading-state { text-align: center; padding: 4rem 1rem; }
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--borde);
  border-top-color: var(--borgona);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state p { font-size: 14px; color: var(--texto-suave); }

.scope-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 1.5rem;
}
.scope-card {
  background: var(--gris-claro);
  border-radius: 10px;
  padding: 10px 12px;
}
.scope-card .slabel { font-size: 11px; color: var(--gris-medio); margin-bottom: 3px; }
.scope-card .svalue { font-size: 13px; font-weight: 600; color: var(--texto); }

.summary-row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--borde);
}
.summary-chip { font-size: 13px; color: var(--texto-suave); }
.summary-chip strong { color: var(--texto); font-weight: 600; }

.team-block { margin-bottom: 1.25rem; }
.team-header {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--borgona);
  padding: 6px 10px;
  background: #f9f3f5;
  border-radius: 8px;
  margin-bottom: 6px;
}
.task-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 10px;
  align-items: start;
  padding: 10px 12px;
  border: 1px solid var(--borde);
  border-radius: 8px;
  margin-bottom: 4px;
  background: var(--blanco);
}
.task-num { font-size: 11px; color: var(--gris-medio); font-family: 'DM Mono', monospace; padding-top: 2px; }
.task-name { font-size: 13px; font-weight: 500; color: var(--texto); margin-bottom: 2px; }
.task-owner { font-size: 12px; color: var(--texto-suave); }
.task-desc { font-size: 12px; color: var(--texto-suave); margin-top: 3px; }
.task-dep { font-size: 11px; color: var(--gris-medio); margin-top: 3px; }
.priority-badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  font-weight: 600;
}
.p-Alta { background: var(--rojo-bg); color: var(--rojo); }
.p-Media { background: var(--amarillo-bg); color: var(--amarillo); }
.p-Baja { background: var(--verde-bg); color: var(--verde); }

.alert {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 8px;
  border-left: 3px solid;
}
.alert-warn { background: var(--amarillo-bg); color: var(--amarillo); border-color: #d97706; }
.alert-info { background: var(--info-bg); color: var(--info); border-color: #3b82f6; }
.alert-ok { background: var(--verde-bg); color: var(--verde); border-color: #10b981; }

.success-state { text-align: center; padding: 2rem 0; }
.success-state h3 { font-size: 20px; font-weight: 600; color: var(--texto); margin-bottom: 0.5rem; }
.success-state p { font-size: 14px; color: var(--texto-suave); margin-bottom: 1.5rem; }
.check-icon {
  width: 56px; height: 56px;
  background: var(--verde-bg);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
  font-size: 26px;
}
.sheet-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 24px;
  border-radius: 8px;
  border: 1.5px solid var(--borgona);
  color: var(--borgona);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.15s;
  margin-bottom: 1.5rem;
}
.sheet-link:hover { background: #f9f3f5; }
.status-list { text-align: left; }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Implementaciones <span>/ Generador de Checklists</span></h1>
</header>

<div class="container">
  <div class="step-bar">
    <div class="step-item active" id="s1"><div class="step-dot">1</div><span>Configurar proyecto</span></div>
    <div class="step-line"></div>
    <div class="step-item" id="s2"><div class="step-dot">2</div><span>Ver checklist</span></div>
    <div class="step-line"></div>
    <div class="step-item" id="s3"><div class="step-dot">3</div><span>Crear en Drive</span></div>
  </div>

  <!-- STEP 1 -->
  <div id="step1" class="card">
    <p class="section-label">Tipo de proyecto</p>
    <div class="proj-grid" id="proj-grid"></div>

    <div class="divider"></div>
    <p class="section-label">Datos del proyecto</p>

    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre del proyecto</label>
        <input type="text" id="proj-name" placeholder="Ej: Mercado Pago Chile" />
      </div>
      <div class="form-group">
        <label>Fecha de go-live</label>
        <input type="date" id="golive-date" />
      </div>
      <div class="form-group" id="posventa-group">
        <label>Gestión de posventa</label>
        <select id="posventa">
          <option value="">— No aplica —</option>
          <option value="Proveedor">Proveedor</option>
          <option value="Despegar">Despegar</option>
          <option value="Mixto">Mixto</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Países</label>
        <div class="tag-grid" id="paises-grid"></div>
      </div>
      <div class="form-group full">
        <label>Negocios</label>
        <div class="tag-grid" id="negocios-grid"></div>
      </div>

      <div class="divider" style="grid-column:1/-1"></div>
      <p class="section-label" style="grid-column:1/-1">Tus datos</p>

      <div class="form-group">
        <label>Tu nombre</label>
        <input type="text" id="user-name" placeholder="Nombre completo" />
      </div>
      <div class="form-group">
        <label>Tu email</label>
        <input type="email" id="user-email" placeholder="tu@despegar.com" />
      </div>
    </div>

    <div id="form-error" class="error-msg" style="display:none"></div>
    <div class="btn-row">
      <button class="btn-primary" id="btn-generate">Generar checklist →</button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none">
    <div id="step2-loading" class="loading-state">
      <div class="spinner"></div>
      <p id="loading-msg">Leyendo documento maestro...</p>
    </div>
    <div id="step2-content" class="card" style="display:none">
      <div class="scope-bar" id="scope-bar"></div>
      <div class="summary-row" id="summary-row"></div>
      <div id="checklist-content"></div>
      <div class="btn-row">
        <button class="btn-secondary" id="btn-back">← Volver</button>
        <button class="btn-primary" id="btn-create">Crear Google Sheet →</button>
      </div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none">
    <div id="step3-loading" class="loading-state">
      <div class="spinner"></div>
      <p id="step3-msg">Creando Google Sheet...</p>
    </div>
    <div id="step3-content" class="card" style="display:none"></div>
  </div>
</div>

<script>
const PROYECTO_TIPOS = [
  "Nueva fuente de inventario","NDC","Nueva consola","Ancillaries via Branch access",
  "Ancillaries Scrapping","Consolidadores","Bimoneda","Loyalty / Pasaporte",
  "Arbitraje","Nuevos medios de pago","Hoteles","ONA"
];
const PAISES = ["AR","CL","CO","PE","EC","MX","BR","Todos"];
const NEGOCIOS = ["B2C","B2B","B2B2C","Todos"];
const MAESTRO_ID = "1oaC7zETlzayrR8-8lWmw8sXB-GwmUXux0ppHB_T7Mao";
const REPO_ID = "1tf7PGNcvgnbpIpdbfCBtcg3qm07VQCY7h6Imy7ggIdo";
const SHARE_EMAILS = ["iparodi@despegar.com","derojas@despegar.com","calfaro@despegar.com"];

let selectedProj = null;
let selectedPaises = [];
let selectedNegocios = [];
let parsedChecklist = null;

// Proyectos grid
const projGrid = document.getElementById('proj-grid');
PROYECTO_TIPOS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'proj-card';
  card.innerHTML = `<div class="num">${String(i+1).padStart(2,'0')}</div><div class="name">${p}</div>`;
  card.onclick = () => {
    document.querySelectorAll('.proj-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedProj = i + 1;
    const needsPostv = [1,2,6,7].includes(selectedProj);
    document.getElementById('posventa-group').style.opacity = needsPostv ? '1' : '0.4';
  };
  projGrid.appendChild(card);
});

// Países tags
const paisesGrid = document.getElementById('paises-grid');
PAISES.forEach(p => {
  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = p;
  tag.onclick = () => {
    if (p === 'Todos') {
      selectedPaises = ['Todos'];
      paisesGrid.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
      tag.classList.add('selected');
    } else {
      paisesGrid.querySelectorAll('.tag').forEach(t => { if (t.textContent === 'Todos') t.classList.remove('selected'); });
      selectedPaises = selectedPaises.filter(x => x !== 'Todos');
      tag.classList.toggle('selected');
      if (tag.classList.contains('selected')) { if (!selectedPaises.includes(p)) selectedPaises.push(p); }
      else { selectedPaises = selectedPaises.filter(x => x !== p); }
    }
  };
  paisesGrid.appendChild(tag);
});

// Negocios tags
const negGrid = document.getElementById('negocios-grid');
NEGOCIOS.forEach(n => {
  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = n;
  tag.onclick = () => {
    if (n === 'Todos') {
      selectedNegocios = ['Todos'];
      negGrid.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
      tag.classList.add('selected');
    } else {
      negGrid.querySelectorAll('.tag').forEach(t => { if (t.textContent === 'Todos') t.classList.remove('selected'); });
      selectedNegocios = selectedNegocios.filter(x => x !== 'Todos');
      tag.classList.toggle('selected');
      if (tag.classList.contains('selected')) { if (!selectedNegocios.includes(n)) selectedNegocios.push(n); }
      else { selectedNegocios = selectedNegocios.filter(x => x !== n); }
    }
  };
  negGrid.appendChild(tag);
});

document.getElementById('posventa-group').style.opacity = '0.4';

document.getElementById('btn-generate').onclick = () => {
  const err = document.getElementById('form-error');
  err.style.display = 'none';
  if (!selectedProj) return showErr('Seleccioná un tipo de proyecto.');
  if (!document.getElementById('proj-name').value.trim()) return showErr('Ingresá el nombre del proyecto.');
  if (!selectedPaises.length) return showErr('Seleccioná al menos un país.');
  if (!selectedNegocios.length) return showErr('Seleccioná al menos un negocio.');
  if (!document.getElementById('user-name').value.trim()) return showErr('Ingresá tu nombre.');
  if (!document.getElementById('user-email').value.trim()) return showErr('Ingresá tu email.');
  goStep2();
};

function showErr(msg) {
  const err = document.getElementById('form-error');
  err.textContent = msg;
  err.style.display = 'block';
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('s'+i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  });
}

function goStep2() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  setStep(2);
  fetchChecklist();
}

async function fetchChecklist() {
  const nombre = document.getElementById('proj-name').value.trim();
  const golive = document.getElementById('golive-date').value;
  const posventa = document.getElementById('posventa').value;
  const userName = document.getElementById('user-name').value.trim();
  const userEmail = document.getElementById('user-email').value.trim();
  const paisesStr = selectedPaises.join(', ');
  const negStr = selectedNegocios.join(', ');
  const tipoNombre = PROYECTO_TIPOS[selectedProj - 1];
  const isHispa = !selectedPaises.includes('BR') || selectedPaises.length > 1 || selectedPaises.includes('Todos');
  const isBrasil = selectedPaises.includes('BR') || selectedPaises.includes('Todos');
  const goliveDisplay = golive ? new Date(golive + 'T12:00:00').toLocaleDateString('es-AR') : 'No definida';
  const regionLabel = selectedPaises.includes('Todos') ? 'Hispa + Brasil' : (selectedPaises.includes('BR') && selectedPaises.length === 1 ? 'Brasil' : selectedPaises.includes('BR') ? 'Hispa + Brasil' : 'Hispa');

  const msgs = ['Leyendo documento maestro...','Filtrando tareas...','Asignando prioridades...','Organizando por equipos...'];
  let mi = 0;
  const iv = setInterval(() => { if (++mi < msgs.length) document.getElementById('loading-msg').textContent = msgs[mi]; }, 1400);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{ type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'google-drive' }],
        system: `Sos un asistente de implementaciones de Despegar.com. Accedé al Google Sheet maestro y extraé las tareas del proyecto indicado. Respondé ÚNICAMENTE con JSON válido, sin markdown ni texto extra.

Estructura requerida:
{
  "equipos": [{ "nombre": "EQUIPO", "tareas": [{ "num": "1", "tarea": "...", "responsable": "...", "descripcion": "...", "dependencia": "Ninguna", "prioridad": "Alta|Media|Baja" }] }],
  "total_tareas": 0,
  "advertencias": []
}`,
        messages: [{ role: 'user', content: `Accedé al Google Sheet ID: ${MAESTRO_ID}

Leé TODAS las hojas. Para cada hoja:
1. Encontrá la columna del tipo de proyecto: "${tipoNombre}"
2. Extraé solo filas donde esa columna = "SI"
3. Para cada tarea:
   - Columna A: número
   - Columna B: equipo
   - Columna C: nombre de tarea
   - Responsable: ${isHispa && isBrasil ? 'columna D + columna E concatenados' : isHispa ? 'columna D (Hispa)' : 'columna E (Brasil)'}
   - Columna F: descripción
   - Columna G: si contiene crítico/urgente/bloqueante/mandatory → Alta; importante/necesario/recomendado → Media; resto → Baja
   - Columna H: dependencia

Proyecto: ${tipoNombre} | Países: ${paisesStr} | Negocios: ${negStr} | Go-live: ${goliveDisplay}${posventa ? ' | Posventa: ' + posventa : ''}

Respondé SOLO el JSON.` }]
      })
    });

    clearInterval(iv);
    const data = await resp.json();
    let raw = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    raw = raw.replace(/```json|```/g, '').trim();
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { parsed = fallback(tipoNombre); }
    parsedChecklist = parsed;
    renderChecklist(parsed, { nombre, goliveDisplay, paisesStr, negStr, regionLabel, tipoNombre });
  } catch(e) {
    clearInterval(iv);
    parsedChecklist = fallback(tipoNombre);
    renderChecklist(parsedChecklist, { nombre, goliveDisplay: golive ? new Date(golive+'T12:00:00').toLocaleDateString('es-AR') : 'No definida', paisesStr, negStr, regionLabel: 'Hispa', tipoNombre });
  }
}

function fallback(tipo) {
  return {
    equipos: [
      { nombre: "Comercial", tareas: [
        { num:"1", tarea:"Validar acuerdo comercial", responsable:"Equipo Comercial", descripcion:"Revisar términos del acuerdo con el proveedor", dependencia:"Ninguna", prioridad:"Alta" },
        { num:"2", tarea:"Definir estructura de comisiones", responsable:"Equipo Comercial", descripcion:"Establecer fees aplicables", dependencia:"1", prioridad:"Media" }
      ]},
      { nombre: "Producto Checkout", tareas: [
        { num:"3", tarea:"Análisis de impacto en checkout", responsable:"Product Owner", descripcion:"Evaluar cambios en el flujo de compra", dependencia:"Ninguna", prioridad:"Alta" },
        { num:"4", tarea:"QA funcional", responsable:"QA Team", descripcion:"Pruebas de regresión en flujos afectados", dependencia:"3", prioridad:"Alta" }
      ]}
    ],
    total_tareas: 4,
    advertencias: [`No se pudo acceder al documento maestro. Verificá los permisos. Se muestran tareas de ejemplo para "${tipo}".`]
  };
}

function renderChecklist(data, meta) {
  document.getElementById('step2-loading').style.display = 'none';
  document.getElementById('step2-content').style.display = 'block';
  window._meta = meta;

  document.getElementById('scope-bar').innerHTML = `
    <div class="scope-card"><div class="slabel">Tipo</div><div class="svalue">${meta.tipoNombre}</div></div>
    <div class="scope-card"><div class="slabel">Países</div><div class="svalue">${meta.paisesStr}</div></div>
    <div class="scope-card"><div class="slabel">Go-live</div><div class="svalue">${meta.goliveDisplay}</div></div>
    <div class="scope-card"><div class="slabel">Región</div><div class="svalue">${meta.regionLabel}</div></div>
  `;

  const allT = data.equipos.flatMap(e => e.tareas);
  const alta = allT.filter(t => t.prioridad === 'Alta').length;
  const media = allT.filter(t => t.prioridad === 'Media').length;
  const baja = allT.filter(t => t.prioridad === 'Baja').length;
  document.getElementById('summary-row').innerHTML = `
    <span class="summary-chip"><strong>${data.total_tareas || allT.length}</strong> tareas</span>
    <span class="summary-chip"><strong>${data.equipos.length}</strong> equipos</span>
    <span class="summary-chip" style="color:#991b1b"><strong>${alta}</strong> alta prioridad</span>
    <span class="summary-chip" style="color:#92400e"><strong>${media}</strong> media</span>
    <span class="summary-chip" style="color:#065f46"><strong>${baja}</strong> baja</span>
  `;

  let html = '';
  (data.advertencias || []).forEach(w => { html += `<div class="alert alert-warn">${w}</div>`; });
  data.equipos.forEach(eq => {
    html += `<div class="team-block"><div class="team-header">${eq.nombre}</div>`;
    eq.tareas.forEach(t => {
      html += `<div class="task-row">
        <div class="task-num">${t.num}</div>
        <div>
          <div class="task-name">${t.tarea}</div>
          <div class="task-owner">${t.responsable}</div>
          ${t.descripcion ? `<div class="task-desc">${t.descripcion}</div>` : ''}
          ${t.dependencia && t.dependencia !== 'Ninguna' ? `<div class="task-dep">Dep: ${t.dependencia}</div>` : ''}
        </div>
        <span class="priority-badge p-${t.prioridad}">${t.prioridad}</span>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('checklist-content').innerHTML = html;
}

document.getElementById('btn-back').onclick = () => {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step2-content').style.display = 'none';
  document.getElementById('step2-loading').style.display = 'block';
  document.getElementById('step1').style.display = 'block';
  setStep(1);
};

document.getElementById('btn-create').onclick = async () => {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
  setStep(3);
  await createSheet();
};

async function createSheet() {
  const nombre = document.getElementById('proj-name').value.trim();
  const golive = document.getElementById('golive-date').value;
  const userName = document.getElementById('user-name').value.trim();
  const userEmail = document.getElementById('user-email').value.trim();
  const paisesStr = selectedPaises.join(', ');
  const negStr = selectedNegocios.join(', ');
  const tipoNombre = PROYECTO_TIPOS[selectedProj - 1];
  const goliveDisplay = golive ? new Date(golive+'T12:00:00').toLocaleDateString('es-AR') : 'No definida';
  const today = new Date().toLocaleDateString('es-AR');
  const dateStamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const fileName = `Checklist - ${nombre} - ${dateStamp}`;
  const allTasks = parsedChecklist ? parsedChecklist.equipos.flatMap(e => e.tareas.map(t => ({...t, equipo: e.nombre}))) : [];

  const msgs = ['Creando Google Sheet...', 'Cargando tareas...', 'Compartiendo con el equipo...', 'Registrando en repositorio...'];
  let mi = 0;
  const iv = setInterval(() => { if (++mi < msgs.length) document.getElementById('step3-msg').textContent = msgs[mi]; }, 1500);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{ type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'google-drive' }],
        system: 'Gestionás Google Sheets via MCP. Respondé SOLO con JSON válido.',
        messages: [{ role: 'user', content: `Realizá estas acciones en orden:

1. Creá un Google Sheet llamado "${fileName}" con:
- A1: "Checklist de Proyecto: ${nombre}"
- A2: "Scope:" | B2: "${paisesStr} | ${negStr}"
- A3: "Fecha de creación:" | B3: "${today}"
- A4: "Responsable:" | B4: "${userName} - ${userEmail}"
- A5: "Go-live estimado:" | B5: "${goliveDisplay}"
- A6: "Tipo de proyecto:" | B6: "${tipoNombre}"
- Fila 7 encabezados: # | PRIORIDAD | EQUIPO | TAREA | RESPONSABLE | DESCRIPCIÓN | DEPENDENCIA | STATUS | FECHA INICIO | FECHA FIN | COMENTARIOS
- Fila 8+: ${allTasks.map((t,i) => `(${t.num}, "${t.prioridad==='Alta'?'🔴 Alta':t.prioridad==='Media'?'🟡 Media':'🟢 Baja'}", "${t.equipo}", "${t.tarea}", "${t.responsable}", "${(t.descripcion||'').replace(/"/g,"'")}", "${t.dependencia||'Ninguna'}", "⏳ Pendiente")`).join(' | ')}

2. Compartí con ${SHARE_EMAILS.join(', ')} como writers.

3. En el Sheet ID ${REPO_ID}, hoja "Repositorio", primera fila vacía, insertá:
A="${tipoNombre}" | B="${nombre}" | C=[URL del sheet] | D="${today}" | E="${userName} - ${userEmail}" | F="${paisesStr}" | G="Activo"

Respondé con:
{ "sheet_url": "...", "sheet_id": "...", "repo_registrado": true/false, "compartido": true/false, "errores": [] }` }]
      })
    });

    clearInterval(iv);
    const data = await resp.json();
    let raw = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    raw = raw.replace(/```json|```/g, '').trim();
    let result = {};
    try { result = JSON.parse(raw); } catch(e) { result = { errores: ['No se pudo procesar la respuesta del servidor.'] }; }
    renderSuccess(result, nombre);
  } catch(e) {
    clearInterval(iv);
    renderSuccess({ errores: [e.message] }, nombre);
  }
}

function renderSuccess(result, nombre) {
  document.getElementById('step3-loading').style.display = 'none';
  const cont = document.getElementById('step3-content');
  cont.style.display = 'block';
  const total = parsedChecklist ? parsedChecklist.equipos.flatMap(e=>e.tareas).length : 0;
  const equipos = parsedChecklist ? parsedChecklist.equipos.length : 0;

  let html = `<div class="success-state">
    <div class="check-icon">✓</div>
    <h3>Checklist creada</h3>
    <p>${total} tareas · ${equipos} equipos · ${PROYECTO_TIPOS[selectedProj-1]}</p>
    ${result.sheet_url ? `<a class="sheet-link" href="${result.sheet_url}" target="_blank">Abrir en Google Sheets ↗</a>` : ''}
    <div class="status-list">
      <div class="alert ${result.repo_registrado ? 'alert-ok' : 'alert-warn'}">
        ${result.repo_registrado ? '✓ Registrado en repositorio central' : '✗ No se pudo registrar en repositorio. Registrá manualmente.'}
      </div>
      <div class="alert ${result.compartido ? 'alert-ok' : 'alert-warn'}">
        ${result.compartido ? `✓ Compartido con ${SHARE_EMAILS.join(', ')}` : `✗ No se pudo compartir automáticamente. Compartí manualmente con: ${SHARE_EMAILS.join(', ')}`}
      </div>
      ${(result.errores||[]).map(e => `<div class="alert alert-warn">✗ ${e}</div>`).join('')}
    </div>
    <div style="margin-top:1.5rem">
      <button class="btn-secondary" onclick="location.reload()">+ Nueva checklist</button>
    </div>
  </div>`;
  cont.innerHTML = html;
}
</script>
</body>
</html>
